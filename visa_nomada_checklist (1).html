<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Nómada Digital — Documentos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --bg2: #242424;
    --bg3: #2e2e2e;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text2: #9e9b95;
    --text3: #6b6966;
    --green: #1D9E75;
    --green-light: #26c28f;
    --blue: #378ADD;
    --amber: #EF9F27;
    --teal-bg: rgba(29,158,117,0.12);
    --blue-bg: rgba(55,138,221,0.12);
    --amber-bg: rgba(239,159,39,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  .sticky-head {
    position: sticky;
    top: 0;
    z-index: 40;
    margin-top: -2rem;
    padding: 2rem 1.125rem 1.75rem;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
  }

  header {
    margin-bottom: 1.25rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text2);
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .stats {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text2);
    border: 0.5px solid var(--border);
  }

  .stats span { color: var(--text); font-weight: 500; }

  button.reset {
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
    transition: background 0.15s, color 0.15s;
  }

  button.reset:hover { background: var(--bg3); color: var(--text); }

  .progress-track {
    height: 5px;
    background: var(--bg3);
    border-radius: 99px;
    margin-bottom: 0;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    width: 0%;
    transition: width 0.35s ease;
  }

  .section {
    margin-bottom: 1.75rem;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 6px;
  }

  .doc-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
    user-select: none;
  }

  .doc-item:hover { background: var(--bg2); }
  .doc-item.done { opacity: 0.45; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .doc-item.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .checkmark {
    display: none;
    width: 11px;
    height: 9px;
  }

  .doc-item.done .checkmark { display: block; }

  .doc-text { flex: 1; }

  .doc-name {
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  .doc-item.done .doc-name { color: var(--text2); }

  .doc-note {
    font-size: 13px;
    color: var(--text3);
    line-height: 1.4;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  .badge-you  { background: var(--teal-bg);  color: #26c28f; }
  .badge-fam  { background: var(--blue-bg);  color: #5ca8f5; }
  .badge-both { background: var(--amber-bg); color: #f5b84a; }

  .badge-tr {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 99px;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .badge-tr-no  { background: rgba(255,255,255,0.06); color: var(--text3); }
  .badge-tr-yes { background: rgba(239,159,39,0.18); color: #f0b04a; }

  .badge-tr-split {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .badge-tr-ico {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    opacity: 0.92;
  }

  .doc-drive {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .doc-drive .drive-label {
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }

  .doc-drive input.drive-url {
    flex: 1;
    min-width: 180px;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
  }

  .doc-drive input.drive-url:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(55,138,221,0.2);
  }

  .doc-drive a.drive-open {
    font-size: 12px;
    color: var(--blue);
    text-decoration: none;
    flex-shrink: 0;
  }

  .doc-drive a.drive-open:hover { text-decoration: underline; }

  footer {
    margin-top: 3rem;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }
</style>
</head>
<body>

const KEY = "nomada_v4";

function migrateLegacyState(raw) {
  if (!raw || typeof raw !== "object" || Array.isArray(raw)) return { done: {}, links: {} };
  if (Object.prototype.hasOwnProperty.call(raw, "done") && typeof raw.done === "object") {
    return { done: { ...raw.done }, links: typeof raw.links === "object" && raw.links ? { ...raw.links } : {} };
  }
  const done = {};
  for (const [k, v] of Object.entries(raw)) {
    if (typeof v === "boolean") done[k] = v;
  }
  return { done, links: {} };
}

function load() {
  try {
    const c = document.cookie.split("; ").find(r => r.startsWith(KEY + "="));
    if (c) return migrateLegacyState(JSON.parse(decodeURIComponent(c.split("=").slice(1).join("="))));
  } catch (e) {}
  return { done: {}, links: {} };
}

function save(st) {
  const exp = new Date();
  exp.setFullYear(exp.getFullYear() + 1);
  document.cookie =
    KEY +
    "=" +
    encodeURIComponent(JSON.stringify({ done: st.done, links: st.links })) +
    "; expires=" +
    exp.toUTCString() +
    "; path=/";
}

let state = load();

const BADGES = {
  you: ["badge-you", "Titular"],
  fam: ["badge-fam", "Familia"],
  both: ["badge-both", "Todos"],
};

function safeDriveUrl(s) {
  if (!s || typeof s !== "string") return "";
  const t = s.trim();
  if (!t) return "";
  try {
    const u = new URL(t);
    if (u.protocol === "https:" || u.protocol === "http:") return u.href;
  } catch (e) {}
  return "";
}

function render() {
  const sec = document.getElementById("sections");
  sec.innerHTML = "";
  DATA.forEach((s) => {
    const div = document.createElement("div");
    div.className = "section";
    div.innerHTML = `<p class="section-title">${s.title}</p>`;
    s.items.forEach((item) => {
      const done = !!state.done[item.id];
      const [bc, bl] = BADGES[item.who];
      const trYes = item.translate === true;
      const trIconGlobe =
        '<svg class="badge-tr-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="6.25"/><path d="M1.75 8h12.5"/><path d="M8 1.75c1.65 2.15 1.65 10.1 0 12.5M8 1.75c-1.65 2.15-1.65 10.1 0 12.5"/></svg>';
      const trBadgeHtml = trYes
        ? `<span class="badge-tr badge-tr-yes"><span class="badge-tr-split">${trIconGlobe}<span>Requiere traducción</span></span></span>`
        : `<span class="badge-tr badge-tr-no">Sin traducción</span>`;
      const linkRaw = state.links[item.id] || "";
      const linkSafe = safeDriveUrl(linkRaw);

      const row = document.createElement("div");
      row.className = "doc-item" + (done ? " done" : "");
      row.innerHTML = `
        <div class="checkbox">
          <svg class="checkmark" viewBox="0 0 11 9" fill="none">
            <path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="doc-text">
          <div class="doc-name">${item.name}<span class="badge ${bc}">${bl}</span>${trBadgeHtml}</div>
          <div class="doc-note">${item.note}</div>
          <div class="doc-drive">
            <span class="drive-label">Enlace</span>
            <input type="url" class="drive-url" data-doc-id="${item.id}" placeholder="https://drive.google.com/..." autocomplete="off" spellcheck="false" />
          </div>
        </div>`;

      const driveWrap = row.querySelector(".doc-drive");
      const input = row.querySelector("input.drive-url");
      if (input) {
        input.value = linkRaw;
        input.addEventListener("click", (e) => e.stopPropagation());
        let persistTimer;
        input.addEventListener("input", () => {
          clearTimeout(persistTimer);
          persistTimer = setTimeout(() => {
            const v = input.value.trim();
            if (v) state.links[item.id] = v;
            else delete state.links[item.id];
            save(state);
          }, 500);
        });
        input.addEventListener("blur", () => {
          clearTimeout(persistTimer);
          const v = input.value.trim();
          if (v) state.links[item.id] = v;
          else delete state.links[item.id];
          save(state);
          render();
        });
      }

      if (linkSafe && driveWrap) {
        const a = document.createElement("a");
        a.className = "drive-open";
        a.href = linkSafe;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = "Abrir";
        a.addEventListener("click", (e) => e.stopPropagation());
        driveWrap.appendChild(a);
      }

      row.addEventListener("click", (e) => {
        if (e.target.closest(".doc-drive")) return;
        state.done[item.id] = !state.done[item.id];
        save(state);
        render();
      });

      div.appendChild(row);
    });
    sec.appendChild(div);
  });
  updateStats();
}

function updateStats() {
  const all = DATA.flatMap((s) => s.items);
  const done = all.filter((i) => state.done[i.id]).length;
  document.getElementById("done").textContent = done;
  document.getElementById("total").textContent = all.length;
  document.getElementById("bar").style.width = all.length ? (done / all.length) * 100 + "%" : "0%";
}

function resetAll() {
  if (confirm("¿Seguro que quieres reiniciar todos los documentos y enlaces de Drive?")) {
    state = { done: {}, links: {} };
    save(state);
    render();
  }
}

render();
</script>
</body>
</html>
