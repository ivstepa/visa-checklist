<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Nómada Digital — Documentos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --bg2: #242424;
    --bg3: #2e2e2e;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text2: #9e9b95;
    --text3: #6b6966;
    --green: #1D9E75;
    --green-light: #26c28f;
    --blue: #378ADD;
    --amber: #EF9F27;
    --teal-bg: rgba(29,158,117,0.12);
    --blue-bg: rgba(55,138,221,0.12);
    --amber-bg: rgba(239,159,39,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text2);
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .stats {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text2);
    border: 0.5px solid var(--border);
  }

  .stats span { color: var(--text); font-weight: 500; }

  button.reset {
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
    transition: background 0.15s, color 0.15s;
  }

  button.reset:hover { background: var(--bg3); color: var(--text); }

  .progress-track {
    height: 5px;
    background: var(--bg3);
    border-radius: 99px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    width: 0%;
    transition: width 0.35s ease;
  }

  .section {
    margin-bottom: 1.75rem;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 6px;
  }

  .doc-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
    user-select: none;
  }

  .doc-item:hover { background: var(--bg2); }
  .doc-item.done { opacity: 0.45; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .doc-item.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .checkmark {
    display: none;
    width: 11px;
    height: 9px;
  }

  .doc-item.done .checkmark { display: block; }

  .doc-text { flex: 1; }

  .doc-name {
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  .doc-item.done .doc-name { color: var(--text2); }

  .doc-note {
    font-size: 13px;
    color: var(--text3);
    line-height: 1.4;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  .badge-you  { background: var(--teal-bg);  color: #26c28f; }
  .badge-fam  { background: var(--blue-bg);  color: #5ca8f5; }
  .badge-both { background: var(--amber-bg); color: #f5b84a; }

  footer {
    margin-top: 3rem;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Renovación Visa Nómada Digital 🇪🇸</h1>
    <p>Marca cada documento cuando lo tengas listo. Se guarda automáticamente en tu navegador.</p>
  </header>

  <div class="top-bar">
    <div class="stats"><span id="done">0</span> / <span id="total">0</span> documentos listos</div>
    <button class="reset" onclick="resetAll()">Reiniciar todo</button>
  </div>

  <div class="progress-track">
    <div class="progress-bar" id="bar"></div>
  </div>

  <div id="sections"></div>

  <footer>El progreso se guarda en una cookie de tu navegador · No se envían datos a ningún servidor</footer>
</div>

<script>
const DATA = [
  {
    title: "Formulario de solicitud",
    items: [
      { id:"f1", name:"Modelo MIT — titular", note:"Firmado digitalmente o a mano", who:"you" },
      { id:"f2", name:"Modelo MIT — esposa", note:"Firmado por ella", who:"fam" },
      { id:"f3", name:"Modelo MIT — hijos (uno por cada hijo)", note:"Firmado por ti como representante legal", who:"fam" },
    ]
  },
  {
    title: "Tasas",
    items: [
      { id:"t1", name:"Tasa 790-038 — titular", note:"Justificante de pago (~80-100 €)", who:"you" },
      { id:"t2", name:"Tasa 790-038 — esposa", note:"Justificante de pago (~80-100 €)", who:"fam" },
      { id:"t3", name:"Tasa 790-038 — hijos (una por cada hijo)", note:"Justificante de pago (~80-100 €)", who:"fam" },
    ]
  },
  {
    title: "Identidad y pasaportes",
    items: [
      { id:"p1", name:"Pasaporte — titular (todas las páginas)", note:"Incluir páginas en blanco", who:"you" },
      { id:"p2", name:"Pasaporte — esposa (todas las páginas)", note:"Incluir páginas en blanco", who:"fam" },
      { id:"p3", name:"Pasaporte — hijos (todas las páginas)", note:"Incluir páginas en blanco", who:"fam" },
      { id:"p4", name:"NIE — titular", note:"Copia escaneada", who:"you" },
      { id:"p5", name:"NIE — esposa e hijos", note:"Copia escaneada de cada uno", who:"fam" },
    ]
  },
  {
    title: "Acreditación de ingresos (autónomo)",
    items: [
      { id:"i1", name:"Últimas 3–4 facturas emitidas a HealNow", note:"Idealmente bilingüe (inglés/español) — mínimo ~4.500 €/mes para familia de 4", who:"you" },
      { id:"i2", name:"Extractos bancarios con ingresos de HealNow", note:"Últimos 3–4 pagos recibidos desde EE. UU. (Wise u otro banco)", who:"you" },
      { id:"i3", name:"Declaración de la Renta (IRPF) — últimos 2 años", note:"Modelo 100 de los años anteriores", who:"you" },
      { id:"i4", name:"Modelo 130 — IRPF trimestral (Q1)", note:"Pagos fraccionados de autónomo, lo saca tu gestor", who:"you" },
      { id:"i5", name:"Modelo 303 — IVA trimestral (Q1)", note:"Lo saca tu gestor", who:"you" },
    ]
  },
  {
    title: "Documentos de la empresa (HealNow)",
    items: [
      { id:"e1", name:"Certificate of Good Standing — HealNow", note:"Emitido por el Secretario de Estado de Delaware, con Apostilla de La Haya", who:"you" },
      { id:"e2", name:"Traducción jurada del Certificate of Good Standing", note:"Por traductor jurado oficial en España", who:"you" },
      { id:"e3", name:"Contrato de prestación de servicios con HealNow", note:"Si no ha cambiado nada, puede valer el mismo de antes", who:"you" },
      { id:"e4", name:"Carta de HealNow como contractor", note:"Debe incluir: que eres Independent Contractor, salario mensual (~4.500 €) y autorización para trabajar 100% remoto desde España", who:"you" },
      { id:"e5", name:"Confirmación de pagos por parte de HealNow", note:"Últimas 3–4 transferencias emitidas desde su parte", who:"you" },
    ]
  },
  {
    title: "Seguridad Social y Hacienda",
    items: [
      { id:"ss1", name:"Certificado corriente de pago — Seguridad Social", note:"Lo descarga tu gestor en la Sede Electrónica de la SS con tu certificado digital", who:"you" },
      { id:"ss2", name:"Certificado corriente de pago — AEAT (Hacienda)", note:"Lo descarga tu gestor online", who:"you" },
      { id:"ss3", name:"Resolución de Alta en el RETA", note:"El documento de cuando te diste de alta como autónomo", who:"you" },
      { id:"ss4", name:"Informe de Vida Laboral actualizado", note:"Se descarga en la Sede Electrónica de la Seguridad Social", who:"you" },
    ]
  },
  {
    title: "Seguro médico",
    items: [
      { id:"sm1", name:"Documento de acreditación del derecho a asistencia sanitaria", note:"Descargarlo de la Seguridad Social — cubre al titular, esposa e hijos como beneficiarios", who:"both" },
    ]
  },
  {
    title: "Antecedentes penales",
    items: [
      { id:"ap1", name:"Autorización de consulta en el formulario (Registro Central de Penados)", note:"Marcar la casilla en el Modelo MIT — la administración consulta directamente", who:"you" },
      { id:"ap2", name:"Declaración Responsable de penales extranjeros — titular", note:"Firmado declarando que no tienes antecedentes en Serbia/EE. UU. en los últimos 5 años (no requiere apostilla)", who:"you" },
      { id:"ap3", name:"Declaración Responsable de penales extranjeros — esposa", note:"Misma declaración firmada por ella", who:"fam" },
    ]
  },
  {
    title: "Documentos familiares",
    items: [
      { id:"df1", name:"Certificado de matrimonio — apostillado y traducido", note:"Nuevo (no mayor de 6 meses) desde Serbia, apostillado y con traducción jurada en España", who:"fam" },
      { id:"df2", name:"Certificados de nacimiento de los hijos — apostillados y traducidos", note:"Mismas condiciones que el certificado de matrimonio", who:"fam" },
      { id:"df3", name:"Padrón Colectivo", note:"Certificado de empadronamiento familiar — se saca en el Ayuntamiento de Valencia, tiene que firmar solo tu esposa", who:"both" },
      { id:"df4", name:"Certificado de matriculación — hijos (del colegio)", note:"Confirmación de que están matriculados en este curso escolar en Valencia", who:"fam" },
    ]
  }
];

const KEY = "nomada_v2";

function load() {
  try {
    const c = document.cookie.split('; ').find(r => r.startsWith(KEY+'='));
    if (c) return JSON.parse(decodeURIComponent(c.split('=').slice(1).join('=')));
  } catch(e) {}
  return {};
}

function save(st) {
  const exp = new Date(); exp.setFullYear(exp.getFullYear()+1);
  document.cookie = KEY+'='+encodeURIComponent(JSON.stringify(st))+'; expires='+exp.toUTCString()+'; path=/';
}

let state = load();

const BADGES = {
  you:  ['badge-you',  'Titular'],
  fam:  ['badge-fam',  'Familia'],
  both: ['badge-both', 'Todos'],
};

function render() {
  const sec = document.getElementById('sections');
  sec.innerHTML = '';
  DATA.forEach(s => {
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `<p class="section-title">${s.title}</p>`;
    s.items.forEach(item => {
      const done = !!state[item.id];
      const [bc, bl] = BADGES[item.who];
      const row = document.createElement('div');
      row.className = 'doc-item' + (done ? ' done' : '');
      row.innerHTML = `
        <div class="checkbox">
          <svg class="checkmark" viewBox="0 0 11 9" fill="none">
            <path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="doc-text">
          <div class="doc-name">${item.name}<span class="badge ${bc}">${bl}</span></div>
          <div class="doc-note">${item.note}</div>
        </div>`;
      row.addEventListener('click', () => { state[item.id] = !state[item.id]; save(state); render(); });
      div.appendChild(row);
    });
    sec.appendChild(div);
  });
  updateStats();
}

function updateStats() {
  const all = DATA.flatMap(s => s.items);
  const done = all.filter(i => state[i.id]).length;
  document.getElementById('done').textContent = done;
  document.getElementById('total').textContent = all.length;
  document.getElementById('bar').style.width = (done/all.length*100).toFixed(0)+'%';
}

function resetAll() {
  if (confirm('¿Seguro que quieres reiniciar todos los documentos?')) { state = {}; save(state); render(); }
}

render();
</script>
</body>
</html>
